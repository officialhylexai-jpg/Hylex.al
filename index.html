<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYLEX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* BACKGROUND PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
}

.badge{
background:#111;
padding:6px 15px;
border-radius:20px;
display:inline-block;
margin-bottom:20px;
border:1px solid #333;
}

h2{
font-size:38px;
}

/* SERVICES */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#111;
padding:25px;
border-radius:15px;
border:1px solid #222;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#555;
}

/* CONTACT BUTTONS */
.btn{
display:inline-block;
margin:10px;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
color:white;
border:1px solid #444;
transition:0.3s;
}

.btn:hover{
border-color:#8a5cff;
box-shadow:0 0 10px #8a5cff;
}

.section{
padding:60px 20px;
text-align:center;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- HERO -->
<section class="hero">
<div class="badge">AI-Powered Automation Systems</div>

<h2>I Build Systems That Work While You Sleep</h2>

<p>Automate • Scale • Profit</p>
<p><b>Results > Promises. I show working demos before payment.</b></p>
</section>

<!-- SERVICES -->
<section class="section">
<h2>What I Do</h2>

<div class="cards">
<div class="card">Make.com Automation</div>
<div class="card">AI Workflow Systems</div>
<div class="card">Modern 3D Websites</div>
</div>

</section>

<!-- CONTACT -->
<section class="section">
<h2>Contact Me</h2>

<a href="https://t.me/smartflowhiren" target="_blank" class="btn">Telegram</a>
<a href="https://instagram.com/flowsync_ai_" target="_blank" class="btn">Instagram</a>
<a href="mailto:officialhylex.ai@gmail.com" class="btn">Email</a>

</section>

<script>

/* PARTICLES BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#8a5cff";
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>

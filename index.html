<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYLEX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Poppins;
background:#050510;
color:white;
overflow-x:hidden;
}

/* GRADIENT BACKGROUND */
body::before{
content:'';
position:fixed;
width:600px;
height:600px;
background:radial-gradient(circle,#00c6ff33,transparent);
top:-100px;
left:-100px;
filter:blur(120px);
animation:move1 10s infinite alternate;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#8a5cff33,transparent);
bottom:-100px;
right:-100px;
filter:blur(120px);
animation:move2 12s infinite alternate;
}

@keyframes move1{
0%{transform:translate(0,0)}
100%{transform:translate(200px,200px)}
}

@keyframes move2{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

/* GLASS CARD */
.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:25px;
transition:0.4s;
}

.glass:hover{
transform:translateY(-8px) scale(1.02);
border-color:#00c6ff;
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
}

h1{
font-size:40px;
margin-bottom:15px;
}

p{
opacity:0.8;
}

/* SERVICES */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
}

/* BUTTONS */
.btn{
display:inline-block;
margin:10px;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
}

.btn:hover{
background:#00c6ff;
transform:scale(1.05);
box-shadow:0 0 20px #00c6ff;
}

/* SCROLL ANIMATION */
.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

/* CURSOR GLOW */
.cursor{
position:fixed;
width:20px;
height:20px;
background:#00c6ff;
border-radius:50%;
pointer-events:none;
filter:blur(10px);
z-index:999;
}

.section{
padding:60px 20px;
text-align:center;
}

</style>
</head>

<body>

<div class="cursor"></div>

<!-- HERO -->
<section class="hero fade">
<h1>HYLEX</h1>

<p>Automate • Scale • Profit</p>
<p><b>Results > Promises. I show working demos before payment.</b></p>

</section>

<!-- SERVICES -->
<section class="section fade">
<h2>What I Do</h2>

<div class="cards">

<div class="glass">Make.com Automation</div>
<div class="glass">AI Workflow Systems</div>
<div class="glass">Modern 3D Websites</div>

</div>

</section>

<!-- CONTACT -->
<section class="section fade">
<h2>Contact Me</h2>

<a href="https://t.me/smartflowhiren" target="_blank" class="btn">Telegram</a>
<a href="https://instagram.com/flowsync_ai_" target="_blank" class="btn">Instagram</a>
<a href="mailto:officialhylex.ai@gmail.com" class="btn">Email</a>

</section>

<script>

/* SCROLL ANIMATION */
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll',()=>{
fades.forEach(el=>{
const top = el.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
el.classList.add('show');
}
});
});

/* CURSOR GLOW */
const cursor = document.querySelector(".cursor");

document.addEventListener("mousemove",(e)=>{
cursor.style.top = e.clientY + "px";
cursor.style.left = e.clientX + "px";
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYLEX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:black;
color:white;
overflow-x:hidden;
}

/* PARTICLES BACKGROUND */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
}

.badge{
display:inline-block;
padding:6px 15px;
border-radius:20px;
border:1px solid #333;
margin-bottom:20px;
font-size:14px;
}

h1{
font-size:32px;
margin-bottom:15px;
}

/* SERVICES */
.section{
text-align:center;
padding:60px 20px;
}

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-top:30px;
}

.card{
padding:15px 25px;
border-radius:30px;
border:1px solid #333;
background:#0a0a0a;
transition:0.3s;
}

.card:hover{
border-color:#8a5cff;
box-shadow:0 0 10px #8a5cff;
}

/* CONTACT */
.btn{
display:inline-block;
margin:10px;
padding:10px 20px;
border-radius:30px;
border:1px solid #333;
color:white;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
border-color:#00c6ff;
box-shadow:0 0 10px #00c6ff;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- HERO -->
<section class="hero">

<div class="badge">AI-Powered Automation Systems</div>

<h1>I Build Systems That Work While You Sleep</h1>

<p>Automate • Scale • Profit</p>
<p style="margin-top:10px;">
<b>Results > Promises. I show working demos before payment.</b>
</p>

</section>

<!-- WHAT I DO -->
<section class="section">

<h2>What I Do</h2>

<div class="cards">
<div class="card">Make.com Automation</div>
<div class="card">AI Workflow Systems</div>
<div class="card">Modern 3D Websites</div>
</div>

</section>

<!-- CONTACT -->
<section class="section">

<h2>Contact Me</h2>

<a href="https://t.me/smartflowhiren" target="_blank" class="btn">Telegram</a>
<a href="https://instagram.com/flowsync_ai_" target="_blank" class="btn">Instagram</a>
<a href="mailto:officialhylex.ai@gmail.com" class="btn">Email</a>

</section>

<script>

/* MOVING STARS BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars=[];

for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
dx:(Math.random()-0.5)*0.3,
dy:(Math.random()-0.5)*0.3
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
s.x+=s.dx;
s.y+=s.dy;

if(s.x<0||s.x>canvas.width) s.dx*=-1;
if(s.y<0||s.y>canvas.height) s.dy*=-1;

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fillStyle="#8a5cff";
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>

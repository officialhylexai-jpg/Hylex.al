<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYLEX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html{
scroll-behavior:smooth;
}

body{
font-family:Poppins;
color:white;
overflow-x:hidden;

/* CLEAN BG */
background: radial-gradient(circle at 20% 30%, #0a3d62, #050510 70%);
background-attachment: fixed;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HERO */
.hero{
text-align:center;
padding:140px 20px 80px;
}

/* SECTION */
.section{
text-align:center;
padding:100px 20px;
opacity:0;
transform:translateY(40px);
transition:0.8s;
}

/* SHOW */
.section.show{
opacity:1;
transform:translateY(0);
}

/* BADGE */
.badge{
display:inline-block;
padding:6px 15px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.2);
margin-bottom:20px;
font-size:14px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

h1{
font-size:36px;
margin-bottom:15px;
}

/* CARDS */
.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-top:30px;
}

.card{
padding:15px 25px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
transition:0.3s;
}

.card:hover{
border-color:#00c6ff;
box-shadow:0 0 15px #00c6ff55;
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px;
padding:12px 25px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.2);
color:white;
text-decoration:none;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
transition:0.3s;
}

.btn:hover{
border-color:#00c6ff;
box-shadow:0 0 15px #00c6ff;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- HERO -->
<section class="hero">
<div class="badge">AI-Powered Automation Systems</div>
<h1>I Build Systems That Work While You Sleep</h1>
<p>Automate • Scale • Profit</p>
<p style="margin-top:10px;"><b>Results > Promises. I show working demos before payment.</b></p>
</section>

<!-- WHAT I DO -->
<section class="section">
<h2>What I Do</h2>
<div class="cards">
<div class="card">Make.com Automation</div>
<div class="card">AI Workflow Systems</div>
<div class="card">Modern 3D Websites</div>
</div>
</section>

<!-- CONTACT -->
<section class="section">
<h2>Contact Me</h2>
<a href="https://t.me/smartflowhiren" target="_blank" class="btn">Telegram</a>
<a href="https://instagram.com/flowsync_ai_" target="_blank" class="btn">Instagram</a>
<a href="mailto:officialhylex.ai@gmail.com" class="btn">Email</a>
</section>

<script>

/* PARTICLES */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles=[];

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
dx:(Math.random()-0.5)*0.4,
dy:(Math.random()-0.5)*0.4
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width) p.dx*=-1;
if(p.y<0||p.y>canvas.height) p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00c6ff";
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

/* SCROLL FIX (DESKTOP + MOBILE) */
const sections=document.querySelectorAll('.section');

function showSections(){
sections.forEach(sec=>{
const top=sec.getBoundingClientRect().top;
if(top < window.innerHeight - 50){
sec.classList.add('show');
}
});
}

/* RUN ON LOAD + SCROLL */
window.addEventListener('scroll', showSections);
window.addEventListener('load', showSections);

</script>

</body>
</html>
